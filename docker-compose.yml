# ============================================
# PRISM ONE — Stack para Portainer (Swarm)
# ============================================
#
# Imagem publicada automaticamente pelo GitHub Actions em:
#   ghcr.io/krivobr/prism-one:latest
#
# Deploy via Portainer:
#   1. Stacks → Add Stack → Repository
#   2. Repository URL: https://github.com/krivobr/prism-one.git
#   3. Preencha as variáveis de ambiente
#   4. Deploy the stack
#
# Acesso: http://IP-DA-VPS:8009
# ============================================

version: "3.8"

services:
  prism-one:
    image: ghcr.io/krivobr/prism-one:latest
    ports:
      - "8009:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
    volumes:
      - uploads:/app/uploads
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  uploads:
    driver: local
